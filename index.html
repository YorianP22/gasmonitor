<script>
// ========== KONFIGURASI ==========
const GAS_URL = '/api/proxy';


async function callAPI(action, data = {}) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, data })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
